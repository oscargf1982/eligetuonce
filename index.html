<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🇪🇸 ELIGE TU ONCE — PIXEL ART EDITION</title>
<style>
/* ═══════════════════════════════════════════════
   PIXEL ART FOUNDATION
═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
  box-sizing:border-box;margin:0;padding:0;
  image-rendering:pixelated;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --px:4px; /* base pixel unit */
  --red:#cc0000;--red2:#ff0000;--red-dark:#880000;
  --gold:#ffcc00;--gold2:#ffaa00;
  --green:#00aa44;--green2:#008833;--green-light:#00ff66;
  --blue:#0044cc;--blue2:#0088ff;
  --orange:#ff8800;
  --white:#ffffff;--off-white:#f0e8d0;
  --black:#111111;--dark:#1a0a00;
  --gray:#555566;--gray2:#8888aa;
  --pixel-border: 4px solid #000;
  --pixel-shadow: 4px 4px 0px #000;
  --pixel-shadow-red: 4px 4px 0px #880000;
  --pixel-shadow-gold: 4px 4px 0px #886600;
  --gk-col:#ffcc00; --def-col:#00cc44; --mid-col:#0088ff; --att-col:#ff6600;
}

html,body{
  height:100%;
  background:var(--dark);
  color:var(--white);
  font-family:'Press Start 2P', monospace;
  overflow:hidden;
  image-rendering:pixelated;
}

/* ── PIXEL FONT SIZES ── */
.px-xs{font-size:6px;line-height:1.8;}
.px-sm{font-size:8px;line-height:1.8;}
.px-md{font-size:10px;line-height:1.6;}
.px-lg{font-size:14px;line-height:1.4;}
.px-xl{font-size:18px;line-height:1.3;}
.px-2xl{font-size:24px;line-height:1.2;}

/* ── PIXEL BORDER (box-shadow based) ── */
.px-box{
  border:4px solid var(--black);
  box-shadow:4px 4px 0 var(--black);
  image-rendering:pixelated;
}
.px-box-inset{
  border:4px solid var(--black);
  box-shadow:inset 2px 2px 0 rgba(255,255,255,0.2), inset -2px -2px 0 rgba(0,0,0,0.4);
}

/* ── PIXEL BUTTON ── */
.px-btn{
  display:inline-block;
  border:none;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  color:var(--black);
  image-rendering:pixelated;
  position:relative;
  transition:transform .05s, box-shadow .05s;
  padding:10px 16px;
  font-size:8px;
  line-height:1.4;
  letter-spacing:1px;
  text-transform:uppercase;
  white-space:nowrap;
}
.px-btn::after{
  content:'';
  position:absolute;bottom:-4px;right:-4px;
  width:100%;height:100%;
  background:var(--black);
  z-index:-1;
}
.px-btn:active{transform:translate(3px,3px);box-shadow:none!important;}
.px-btn:active::after{display:none;}

.px-btn-red{background:var(--red);color:var(--white);}
.px-btn-red::after{background:var(--red-dark);}
.px-btn-gold{background:var(--gold);color:var(--black);}
.px-btn-gold::after{background:#886600;}
.px-btn-green{background:var(--green);color:var(--white);}
.px-btn-green::after{background:var(--green2);}
.px-btn-gray{background:var(--gray2);color:var(--black);}
.px-btn-gray::after{background:var(--gray);}
.px-btn-sm{padding:6px 10px;font-size:6px;}
.px-btn-lg{padding:14px 24px;font-size:10px;}

/* ── SCANLINE OVERLAY ── */
.scanlines::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;z-index:100;
}

/* ── PIXEL ANIMATION KEYFRAMES ── */
@keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
@keyframes march{0%{background-position:0 0;}100%{background-position:16px 0;}}
@keyframes float-px{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes shake-px{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes pulse-px{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes slide-in-bottom{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes crt-flicker{0%{opacity:1;}92%{opacity:1;}93%{opacity:.6;}95%{opacity:1;}98%{opacity:.8;}100%{opacity:1;}}
@keyframes pixel-pop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}

/* ══════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════ */
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;position:relative;}
.screen.active{display:flex;}

/* ══════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════ */
#home{
  background:
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,0,0,0.03) 3px, rgba(255,0,0,0.03) 4px),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,0,0,0.03) 3px, rgba(255,0,0,0.03) 4px),
    linear-gradient(180deg, #1a0000 0%, #2a0008 50%, #1a0000 100%);
  align-items:center;justify-content:center;
  animation:crt-flicker 8s infinite;
}

.home-container{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;padding:20px 16px;max-width:400px;width:100%;
  z-index:1;
}

/* Pixel trophy */
.pixel-trophy{
  width:64px;height:64px;
  image-rendering:pixelated;
  animation:float-px 2s ease-in-out infinite;
}

/* Title with pixel shadow */
.home-title-wrap{text-align:center;}
.home-eyebrow{
  font-size:7px;letter-spacing:2px;color:var(--gold);
  margin-bottom:12px;animation:blink 2s step-end infinite;
}
.home-title-main{
  font-size:clamp(20px,6vw,32px);
  color:var(--white);
  text-shadow:
    4px 4px 0 var(--red-dark),
    8px 8px 0 rgba(0,0,0,0.5);
  line-height:1.1;
  margin-bottom:4px;
}
.home-title-accent{
  font-size:clamp(28px,8vw,48px);
  color:var(--gold);
  text-shadow:
    4px 4px 0 #886600,
    8px 8px 0 rgba(0,0,0,0.5);
  display:block;
  animation:pulse-px 3s ease-in-out infinite;
}
.home-title-sub{
  font-size:clamp(14px,4vw,20px);
  color:var(--red2);
  text-shadow:3px 3px 0 var(--red-dark);
  display:block;margin-top:4px;
}

/* Pixel flag bar */
.pixel-flag{
  width:100%;height:16px;
  background:linear-gradient(90deg,
    var(--red) 0%, var(--red) 33%,
    var(--gold) 33%, var(--gold) 66%,
    var(--red) 66%, var(--red) 100%
  );
  border-top:4px solid #000;border-bottom:4px solid #000;
  image-rendering:pixelated;
}

/* Showcase pixel avatars */
.home-showcase{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.px-avatar-wrap{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
}
.px-avatar{
  width:48px;height:48px;
  image-rendering:pixelated;
  border:4px solid var(--black);
  box-shadow:4px 4px 0 var(--black);
  position:relative;
  overflow:hidden;
  transition:transform .05s;
}
.px-avatar:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--black);}
.px-avatar img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:pixelated;
  display:block;
}
.px-avatar-name{
  font-size:6px;color:var(--off-white);
  text-shadow:1px 1px 0 #000;
}

/* Pixel selector bar */
.home-stats{
  display:flex;gap:0;
  border:4px solid #000;
  box-shadow:4px 4px 0 #000;
  overflow:hidden;
}
.home-stat{
  padding:6px 10px;font-size:6px;
  border-right:4px solid #000;
  background:rgba(255,255,255,0.05);
}
.home-stat:last-child{border-right:none;}
.home-stat span{color:var(--gold);}

/* Marching ants border for CTA */
.march-border{
  position:relative;padding:4px;
  background:transparent;
}
.march-border::before{
  content:'';position:absolute;inset:0;
  border:4px dashed var(--gold);
  animation:march .4s linear infinite;
}

/* ══════════════════════════════════════════════
   PIXEL TOP BAR
══════════════════════════════════════════════ */
.px-topbar{
  background:var(--red);
  border-bottom:4px solid var(--black);
  padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-shrink:0;
  box-shadow:0 4px 0 var(--red-dark);
  position:relative;z-index:10;
}
.px-topbar-title{
  font-size:8px;color:var(--white);
  text-shadow:2px 2px 0 var(--red-dark);
  letter-spacing:1px;
}
.px-topbar-sub{font-size:6px;color:rgba(255,255,255,0.6);margin-top:4px;}

/* Progress bar pixel */
.px-progress-track{
  height:12px;background:#222;
  border-bottom:4px solid #000;
  flex-shrink:0;position:relative;
}
.px-progress-fill{
  height:100%;
  background:repeating-linear-gradient(
    90deg,
    var(--gold) 0px, var(--gold) 8px,
    var(--gold2) 8px, var(--gold2) 16px
  );
  transition:width .3s steps(10,end);
  border-right:4px solid var(--black);
  image-rendering:pixelated;
}

/* ══════════════════════════════════════════════
   FORMATION SCREEN
══════════════════════════════════════════════ */
#formation{
  background:
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(255,255,255,0.01) 15px, rgba(255,255,255,0.01) 16px),
    repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(255,255,255,0.01) 15px, rgba(255,255,255,0.01) 16px),
    var(--dark);
}
.form-scroll{flex:1;overflow-y:auto;padding:12px;}
.form-scroll::-webkit-scrollbar{width:8px;}
.form-scroll::-webkit-scrollbar-track{background:#222;border-left:4px solid #000;}
.form-scroll::-webkit-scrollbar-thumb{background:var(--red);border:2px solid #000;}
.form-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;max-width:500px;margin:0 auto 12px;
}
@media(max-width:320px){.form-grid{grid-template-columns:1fr 1fr;}}

/* Formation card pixel style */
.fc{
  background:#1a1a2e;
  border:4px solid #444;
  cursor:pointer;
  transition:transform .05s;
  padding:12px 10px;
  image-rendering:pixelated;
  position:relative;
}
.fc::after{
  content:'';position:absolute;
  bottom:-4px;right:-4px;
  width:100%;height:100%;
  background:#000;z-index:-1;
}
.fc:hover{transform:translate(-2px,-2px);}
.fc:hover::after{width:calc(100% + 2px);height:calc(100% + 2px);}
.fc.sel{
  border-color:var(--gold);
  background:#2a1a00;
  transform:translate(-2px,-2px);
}
.fc.sel::after{background:#886600;}
.fc-name{
  font-size:16px;text-align:center;
  margin-bottom:10px;color:var(--white);
  text-shadow:2px 2px 0 #000;
}
.fc.sel .fc-name{color:var(--gold);}

/* Pixel mini field */
.fc-field{
  background:#1a4a1a;
  border:4px solid #000;
  padding:8px 6px;min-height:76px;
  display:flex;flex-direction:column;
  justify-content:space-evenly;gap:4px;
}
.fc-row{display:flex;justify-content:center;gap:4px;}
.px-dot{
  width:8px;height:8px;
  image-rendering:pixelated;
}
.fc-tags{
  display:flex;justify-content:center;gap:4px;
  margin-top:8px;flex-wrap:wrap;
}
.fc-tag{
  font-size:6px;padding:2px 4px;
  border:2px solid;
}
.btn-next-wrap{
  padding:0 12px 16px;
  max-width:480px;margin:0 auto;width:100%;
}

/* ══════════════════════════════════════════════
   BUILDER SCREEN
══════════════════════════════════════════════ */
#builder{
  background:
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(0,255,0,0.01) 15px, rgba(0,255,0,0.01) 16px),
    repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(0,255,0,0.01) 15px, rgba(0,255,0,0.01) 16px),
    var(--dark);
}
.field-outer{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.field-outer::-webkit-scrollbar{width:8px;}
.field-outer::-webkit-scrollbar-track{background:#222;border-left:4px solid #000;}
.field-outer::-webkit-scrollbar-thumb{background:var(--green);border:2px solid #000;}

.field-wrap{padding:10px 10px 0;max-width:420px;width:100%;margin:0 auto;}

/* THE PIXEL FOOTBALL FIELD */
.px-field{
  position:relative;
  aspect-ratio:9/13;
  background:
    repeating-linear-gradient(
      180deg,
      #1a6b1a 0px, #1a6b1a 28px,
      #186018 28px, #186018 56px
    );
  border:8px solid #000;
  box-shadow:8px 8px 0 #000;
  image-rendering:pixelated;
  overflow:hidden;
}
/* Pixel grass texture overlay */
.px-field::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.05) 0,rgba(0,0,0,0.05) 1px,
      transparent 1px,transparent 32px
    );
  pointer-events:none;z-index:1;
}

/* Field lines SVG */
.field-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  opacity:.35;z-index:2;
  image-rendering:pixelated;
}

/* Field badges */
.field-badge{
  position:absolute;top:8px;
  font-size:7px;padding:4px 8px;
  background:#000;border:3px solid var(--gold);
  box-shadow:3px 3px 0 var(--red-dark);
  z-index:10;
  image-rendering:pixelated;
}
.field-badge.r{right:8px;color:var(--gold);}
.field-badge.l{left:8px;color:var(--white);}

/* Field rows container */
.field-rows{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;
  justify-content:space-around;
  padding:10px 4px;
}
.f-row{display:flex;justify-content:space-evenly;align-items:center;}

/* ── PIXEL SLOT ── */
.slot{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;
  min-width:48px;
  position:relative;
}
.slot-inner{
  position:relative;display:inline-block;
  transition:transform .05s;
}
.slot:hover .slot-inner{transform:translate(-2px,-2px);}
.slot.filled:hover .slot-inner{transform:translate(-2px,-2px) scale(1.05);}

/* Empty slot: pixel dashed square */
.slot-empty{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;
  image-rendering:pixelated;
  background:rgba(0,0,0,0.4);
  position:relative;
  /* Dashed pixel border using box-shadow */
}
.slot-empty::before{
  content:'';position:absolute;inset:0;
  border:3px dashed currentColor;
  opacity:.8;
}
.slot-empty::after{
  content:'';position:absolute;
  bottom:-3px;right:-3px;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);z-index:-1;
}

/* Filled slot: pixel player card */
.slot-av{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;
  color:var(--white);
  border:4px solid var(--white);
  image-rendering:pixelated;
  position:relative;overflow:hidden;
}
/* Pixel shine on top-left */
.slot-av::after{
  content:'';position:absolute;
  top:0;left:0;width:12px;height:4px;
  background:rgba(255,255,255,0.4);
  pointer-events:none;
}
.slot-av img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:pixelated;
  display:block;
}

/* Pixel number badge */
.slot-num{
  position:absolute;top:-6px;right:-6px;z-index:2;
  padding:1px 4px;font-size:7px;
  color:#000;
  border:2px solid #000;
  line-height:1.4;
}

/* Captain & remove buttons */
.slot-cap{
  position:absolute;top:-6px;left:-6px;z-index:2;
  width:16px;height:16px;border:2px solid #000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:7px;font-family:inherit;
  opacity:0;transition:opacity .15s;
}
.slot-cap.on{opacity:1!important;}
.slot-rm{
  position:absolute;bottom:-6px;right:-6px;z-index:2;
  width:16px;height:16px;
  background:var(--red);border:2px solid #000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;font-family:inherit;color:#fff;
  opacity:0;transition:opacity .15s;line-height:1;
}
.slot:hover .slot-cap,.slot:hover .slot-rm{opacity:1;}

/* Slot name */
.slot-name{
  font-size:6px;color:var(--white);
  text-align:center;max-width:52px;
  text-shadow:1px 1px 0 #000,2px 2px 0 #000;
  text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  image-rendering:pixelated;
}

/* Glow effects — pixel style (no blur, just colored border) */
.gk-glow{border-color:var(--gold)!important;box-shadow:0 0 0 2px var(--gold),4px 4px 0 #000;}
.def-glow{border-color:var(--green-light)!important;box-shadow:0 0 0 2px var(--green-light),4px 4px 0 #000;}
.mid-glow{border-color:var(--blue2)!important;box-shadow:0 0 0 2px var(--blue2),4px 4px 0 #000;}
.att-glow{border-color:var(--orange)!important;box-shadow:0 0 0 2px var(--orange),4px 4px 0 #000;}

/* ── BOTTOM PANEL ── */
.px-bottom{
  padding:8px 10px 10px;flex-shrink:0;
  max-width:420px;width:100%;margin:0 auto;
}
.px-alert{
  padding:6px 10px;margin-bottom:8px;
  font-size:6px;text-align:center;
  border:3px solid;
  image-rendering:pixelated;
  line-height:1.8;
}
.px-alert.warn{
  border-color:var(--orange);
  color:var(--orange);
  background:rgba(255,136,0,0.1);
  animation:blink 1.5s step-end infinite;
}
.px-alert.ok{
  border-color:var(--green-light);
  color:var(--green-light);
  background:rgba(0,255,102,0.08);
}
.share-row{display:flex;gap:8px;}

/* FAB pixel */
.px-fab{
  position:fixed;bottom:16px;right:12px;z-index:50;
  width:48px;height:48px;
  background:var(--gold);
  border:4px solid #000;
  box-shadow:4px 4px 0 #000;
  cursor:pointer;font-size:18px;
  display:none;align-items:center;justify-content:center;
  font-family:inherit;
  animation:pulse-px 1.5s ease-in-out infinite;
}
.px-fab.visible{display:flex;}
.px-fab:active{transform:translate(3px,3px);box-shadow:none;}

/* ══════════════════════════════════════════════
   PIXEL MODAL
══════════════════════════════════════════════ */
.px-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.85);
  z-index:300;align-items:flex-end;justify-content:center;
}
.px-overlay.open{display:flex;}

.px-modal{
  width:100%;max-width:480px;
  background:#0a0a1a;
  border:4px solid #000;
  border-bottom:none;
  box-shadow:-4px -4px 0 var(--red),0 0 0 8px #000;
  max-height:82vh;display:flex;flex-direction:column;
  overflow:hidden;
  animation:slide-in-bottom .2s steps(6,end);
}

/* Modal header */
.px-modal-head{
  padding:10px 12px 8px;
  border-bottom:4px solid #000;
  background:var(--red);
  flex-shrink:0;
}
.px-modal-head-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.px-pos-badge{
  font-size:7px;padding:3px 8px;
  border:3px solid;
}
.px-modal-ttl{font-size:8px;flex:1;color:var(--white);}
.px-modal-cnt{font-size:6px;color:rgba(255,255,255,.55);}
.px-close{
  width:24px;height:24px;
  background:#000;border:3px solid var(--white);
  color:var(--white);cursor:pointer;
  font-size:12px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;line-height:1;
  flex-shrink:0;
}
.px-close:active{background:var(--red);}



.px-modal-list{
  overflow-y:auto;padding:8px 10px 16px;flex:1;
}
.px-modal-list::-webkit-scrollbar{width:8px;}
.px-modal-list::-webkit-scrollbar-track{background:#111;border-left:4px solid #000;}
.px-modal-list::-webkit-scrollbar-thumb{background:var(--red);border:2px solid #000;}
.px-empty{
  text-align:center;color:#555;
  padding:32px 0;font-size:8px;
  line-height:2;
}

/* ── PIXEL PLAYER CARD ── */
.px-card{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  background:#111122;
  border:3px solid #333;
  margin-bottom:6px;
  cursor:pointer;
  position:relative;
  transition:transform .05s;
  image-rendering:pixelated;
}
.px-card::after{
  content:'';position:absolute;
  bottom:-3px;right:-3px;
  width:100%;height:100%;
  background:#000;z-index:-1;
}
.px-card:not(.px-off):hover{
  transform:translate(-2px,-2px);
  border-color:var(--gold);
}
.px-card:not(.px-off):hover::after{
  width:calc(100% + 2px);height:calc(100% + 2px);
}
.px-card.px-off{opacity:.25;cursor:not-allowed;}

/* Left color stripe */
.px-card::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:4px;
}

.px-card-av{
  width:40px;height:40px;
  border:3px solid var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:'Press Start 2P',monospace;
  color:var(--white);
  flex-shrink:0;
  overflow:hidden;
  image-rendering:pixelated;
  position:relative;
}
.px-card-av img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  image-rendering:pixelated;
  display:block;
}
.px-card-info{flex:1;min-width:0;}
.px-card-name{
  font-size:8px;margin-bottom:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.px-card-club{font-size:6px;color:var(--gray2);margin-bottom:5px;}
.px-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.px-tag{font-size:6px;padding:1px 4px;border:2px solid;}

/* Pixel popularity bar */
.px-popbar{
  height:4px;
  background:#222;
  border:2px solid #000;
  margin-top:4px;overflow:hidden;
}
.px-popbar-fill{height:100%;image-rendering:pixelated;}

.px-card-num{
  font-size:20px;
  min-width:28px;text-align:right;
  text-shadow:2px 2px 0 #000;
}

/* ══════════════════════════════════════════════
   SHARE OVERLAY
══════════════════════════════════════════════ */
.share-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  z-index:400;
  align-items:center;justify-content:center;
  flex-direction:column;padding:16px;
}
.share-ov.open{display:flex;}

.share-card{
  width:100%;max-width:320px;
  background:#1a0000;
  border:4px solid var(--gold);
  box-shadow:8px 8px 0 #000, 12px 12px 0 var(--red-dark);
  padding:0;overflow:hidden;flex-shrink:0;
}
.sc-head{
  background:var(--red);
  border-bottom:4px solid #000;
  padding:12px;text-align:center;
}
.sc-title{
  font-size:10px;color:var(--gold);
  text-shadow:2px 2px 0 var(--red-dark);
  margin-bottom:4px;
}
.sc-sub{
  font-size:6px;color:rgba(255,255,255,.5);
  letter-spacing:2px;animation:blink 2s step-end infinite;
}
.sc-field{
  margin:8px;
  background:#1a5a1a;
  border:4px solid #000;
  padding:8px 4px;
}
.sc-rows{display:flex;flex-direction:column;gap:8px;}
.sc-row{display:flex;justify-content:space-evenly;}
.sc-slot{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sc-av{
  width:32px;height:32px;
  border:3px solid var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-family:'Press Start 2P',monospace;
  overflow:hidden;image-rendering:pixelated;
}
.sc-av img{width:100%;height:100%;object-fit:cover;object-position:top center;image-rendering:pixelated;}
.sc-nm{
  font-size:5px;color:var(--white);
  text-transform:uppercase;
  max-width:40px;text-align:center;line-height:1.3;
  text-shadow:1px 1px 0 #000;
}
.sc-footer{
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:4px solid #000;background:rgba(0,0,0,.5);
}
.sc-form{font-size:10px;color:var(--gold);text-shadow:2px 2px 0 #000;}

.share-btns{
  display:flex;gap:8px;margin-top:12px;
  width:100%;max-width:320px;
}
.share-hint{
  margin-top:10px;font-size:6px;
  color:rgba(255,255,255,.35);text-align:center;
  animation:blink 3s step-end infinite;
}

/* ══════════════════════════════════════════════
   PIXEL DECORATIONS
══════════════════════════════════════════════ */
/* Pixel stars / sparkles */
.px-star{
  position:absolute;
  width:8px;height:8px;
  image-rendering:pixelated;
  animation:blink var(--dur,.8s) step-end infinite;
  pointer-events:none;
}

/* Pixel corner decorations */
.corner-tl,.corner-tr,.corner-bl,.corner-br{
  position:absolute;width:16px;height:16px;
  pointer-events:none;z-index:5;
}
.corner-tl{top:0;left:0;border-top:4px solid var(--gold);border-left:4px solid var(--gold);}
.corner-tr{top:0;right:0;border-top:4px solid var(--gold);border-right:4px solid var(--gold);}
.corner-bl{bottom:0;left:0;border-bottom:4px solid var(--gold);border-left:4px solid var(--gold);}
.corner-br{bottom:0;right:0;border-bottom:4px solid var(--gold);border-right:4px solid var(--gold);}

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media(max-height:600px){
  .home-title-main{font-size:16px;}
  .home-title-accent{font-size:22px;}
  .home-showcase{display:none;}
  .home-container{gap:10px;}
}
@media(max-width:360px){
  .px-card-name{font-size:7px;}
  .slot-name{font-size:5px;}
}


/* ── COACH PIXEL STYLE ── */
.coach-banner{
  image-rendering:pixelated;
  filter:drop-shadow(2px 2px 0 #000);
  animation:crt-flicker 12s infinite;
}

/* ── TROPHY ANIMATION ── */
.trophy-bounce{
  animation:trophy-hop .6s steps(4,end) infinite alternate;
}
@keyframes trophy-hop{
  0%{transform:translateY(0);}
  100%{transform:translateY(-4px);}
}

</style>
</head>

/* ═══════════════════ STATE ══════════════════════════════ */
let selForm="4-3-3",lineup={},captain=null,activeSlot=null;
function getSlots(fid){
  const f=FORMS.find(x=>x.id===fid);
  const s=[];
  s.push({id:"GK-0",pos:"GK"});
  for(let i=0;i<f.def;i++)s.push({id:`DEF-${i}`,pos:"DEF"});
  for(let i=0;i<f.mid;i++)s.push({id:`MID-${i}`,pos:"MID"});
  for(let i=0;i<f.att;i++)s.push({id:`ATT-${i}`,pos:"ATT"});
  return s;
}
function usedIds(){return new Set(Object.values(lineup).map(p=>p?.id).filter(Boolean));}
function ini(name){return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function save(){try{localStorage.setItem("esp11_px",JSON.stringify({selForm,lineup,captain}));}catch(e){}}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem("esp11_px")||"{}");
    if(d.selForm)selForm=d.selForm;
    if(d.lineup)lineup=d.lineup;
    if(d.captain)captain=d.captain;
  }catch(e){}
}

/* ═══════════════════ SOUND ══════════════════════════════ */
let AC=null;
function beep(freq=440,dur=0.08,type="square"){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0.1,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g);g.connect(AC.destination);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function playClick(){beep(220,.06,"square");}
function playSelect(){beep(440,.05,"square");setTimeout(()=>beep(660,.08,"square"),60);}
function playError(){beep(110,.15,"sawtooth");}

/* ═══════════════════ NAV ════════════════════════════════ */
function goTo(s){
  document.querySelectorAll(".screen").forEach(el=>el.classList.remove("active"));
  document.getElementById(s).classList.add("active");
  if(s==="builder")renderBuilder();
  playClick();
}

/* ═══════════════════ HOME ═══════════════════════════════ */
function renderHomeStars(){
  if(!document.getElementById('homeStars'))return;
  const top=[25,21,12,16,15,20];
  document.getElementById("homeStars").innerHTML=top.map(id=>{
    const p=P.find(x=>x.id===id);
    const url=PHOTOS[p.slug];
    return `<div class="px-avatar-wrap">
      <div class="px-avatar" data-slug="${p.slug}" style="background:${GBG[p.pos]};">
        ${url?`<img src="${url}" alt="${p.name}" onerror="this.parentNode.style.background='${GBG[p.pos]}';this.remove();">`:`<span style="font-size:10px;font-family:'Press Start 2P',monospace;">${ini(p.name)}</span>`}
      </div>
      <div class="px-avatar-name">${p.name.split(" ")[0].toUpperCase()}</div>
    </div>`;
  }).join("");
}
function refreshHomeAvatars(){
  document.querySelectorAll(".px-avatar[data-slug]").forEach(el=>{
    const slug=el.dataset.slug;
    const url=PHOTOS[slug];
    const p=P.find(x=>x.slug===slug);
    if(url&&!el.querySelector("img")){
      el.style.background="#000";
      el.innerHTML=`<img src="${url}" alt="" style="image-rendering:pixelated;"
        onerror="this.parentNode.style.background='${GBG[p.pos]}';this.remove();">`;
    }
  });
}

/* ═══════════════════ FORMATIONS ════════════════════════ */
function renderForms(){
  document.getElementById("fLabel").textContent=selForm;
  document.getElementById("fGrid").innerHTML=FORMS.map(f=>{
    const rows=[{t:"ATT",n:f.att},{t:"MID",n:f.mid},{t:"DEF",n:f.def},{t:"GK",n:1}]
      .map(r=>`<div class="fc-row">${
        Array.from({length:r.n}).map(()=>
          `<div class="px-dot" style="background:${COL[r.t]};box-shadow:1px 1px 0 #000;"></div>`
        ).join("")
      }</div>`).join("");
    const tags=[{t:"GK",n:1},{t:"DEF",n:f.def},{t:"MID",n:f.mid},{t:"ATT",n:f.att}]
      .map(b=>`<span class="fc-tag" style="color:${COL[b.t]};border-color:${COL[b.t]};">${b.n}${b.t}</span>`).join("");
    return `<div class="fc ${selForm===f.id?"sel":""}" onclick="pickForm('${f.id}')">
      <div class="fc-name">${f.id}</div>
      <div class="fc-field">${rows}</div>
      <div class="fc-tags">${tags}</div>
    </div>`;
  }).join("");
}
function pickForm(fid){selForm=fid;lineup={};captain=null;renderForms();playClick();}

/* ═══════════════════ BUILDER ════════════════════════════ */
function renderBuilder(){
  document.getElementById("bhForm").textContent=selForm;
  document.getElementById("fBadge").textContent=selForm;
  renderField();renderHUD();
}
function renderField(){
  const ss=getSlots(selForm);
  document.getElementById("fRows").innerHTML=
    ["GK","DEF","MID","ATT"].map(rt=>{
      const rs=ss.filter(s=>s.pos===rt);
      return `<div class="f-row">${rs.map(s=>renderSlot(s)).join("")}</div>`;
    }).join("");
}
function renderSlot(s){
  const pl=lineup[s.id];
  const col=COL[s.pos],lbl=LBL[s.pos];
  if(!pl){
    return `<div class="slot" onclick="openModal('${s.id}','${s.pos}')">
      <div class="slot-inner">
        <div class="slot-empty" style="color:${col};">
          <span style="font-size:7px;">${lbl}</span>
        </div>
      </div>
      <div class="slot-name" style="opacity:0;">·</div>
    </div>`;
  }
  const isCap=captain===pl.id;
  const url=PHOTOS[pl.slug];
  const avContent=url
    ?`<img src="${url}" alt="${pl.name}" style="image-rendering:pixelated;" onerror="this.parentNode.style.background='${GBG[pl.pos]}';this.parentNode.innerHTML='<span style=font-size:11px>${ini(pl.name)}</span>';this.remove();">`
    :`<span style="font-size:11px;">${ini(pl.name)}</span>`;
  return `<div class="slot filled" onclick="openModal('${s.id}','${s.pos}')">
    <div class="slot-inner">
      <div class="slot-av ${GGLOW[s.pos]}" style="background:${GBG[pl.pos]};">${avContent}</div>
      <div class="slot-num" style="background:${col};">${pl.n}</div>
      <button class="slot-cap ${isCap?"on":""}"
        style="background:${isCap?"#ffcc00":"#222"};color:${isCap?"#000":"#ffcc00"};"
        onclick="toggleCap(event,${pl.id})">C</button>
      <button class="slot-rm" onclick="removeSlot(event,'${s.id}')">×</button>
    </div>
    <div class="slot-name">${pl.name.split(" ")[0]}</div>
  </div>`;
}
function removeSlot(e,sid){
  e.stopPropagation();
  if(lineup[sid]&&captain===lineup[sid].id)captain=null;
  delete lineup[sid];
  save();renderBuilder();playClick();
}
function toggleCap(e,pid){
  e.stopPropagation();
  captain=(captain===pid)?null:pid;
  renderField();playClick();
}
function resetAll(){lineup={};captain=null;save();renderBuilder();playError();}
function renderHUD(){
  const total=usedIds().size;
  document.getElementById("bhCount").textContent=`${total}/11 PLAYERS`;
  document.getElementById("pFill").style.width=`${(total/11)*100}%`;
  const wEl=document.getElementById("alertWarn");
  const oEl=document.getElementById("alertOk");
  const bs=document.getElementById("btnSave"),bw=document.getElementById("btnWA");
  const fab=document.getElementById("fab");
  if(total===11){
    wEl.style.display="none";oEl.style.display="block";
    oEl.textContent="✅ XI COMPLETE! READY TO SHARE!";
    bs.disabled=false;bw.disabled=false;fab.classList.add("visible");
  } else {
    wEl.style.display="block";oEl.style.display="none";
    wEl.textContent=`▶ SELECT ${11-total} MORE PLAYER${11-total!==1?"S":""} ◀`;
    bs.disabled=true;bw.disabled=true;fab.classList.remove("visible");
  }
}

/* ═══════════════════ MODAL ══════════════════════════════ */
function openModal(slotId,posType){
  activeSlot={slotId,posType};
  const col=COL[posType];
  const b=document.getElementById("mPos");
  b.textContent=LBL[posType];
  b.style.cssText=`color:${col};border-color:${col};`;
  document.getElementById("mSearch").value="";
  document.getElementById("mOverlay").classList.add("open");
  renderList();
  setTimeout(()=>document.getElementById("mSearch").focus(),100);
  playClick();
}
function closeModal(){document.getElementById("mOverlay").classList.remove("open");activeSlot=null;}
function maybeClose(e){if(e.target===document.getElementById("mOverlay"))closeModal();}
function renderList(){
  if(!activeSlot)return;
  const {slotId,posType}=activeSlot;
  const q=document.getElementById("mSearch").value.toLowerCase().trim();
  const uid=usedIds();
  const cur=lineup[slotId];
  const col=COL[posType];
  const valid=P
    .filter(p=>p.pos===posType)
    .filter(p=>!q||p.name.toLowerCase().includes(q)||p.club.toLowerCase().includes(q))
    .sort((a,b)=>b.pop-a.pop);
  document.getElementById("mCnt").textContent=`${valid.length} AVAILABLE`;
  if(!valid.length){
    document.getElementById("mList").innerHTML=`<div class="px-empty">▶ NO RESULTS ◀</div>`;return;
  }
  document.getElementById("mList").innerHTML=valid.map(pl=>{
    const taken=uid.has(pl.id)&&cur?.id!==pl.id;
    const url=PHOTOS[pl.slug];
    const avContent=url
      ?`<img src="${url}" alt="${pl.name}" style="image-rendering:pixelated;" onerror="this.parentNode.style.background='${GBG[pl.pos]}';this.remove();">`
      :`${ini(pl.name)}`;
    return `<div class="px-card ${taken?"px-off":""}" onclick="${taken?"":"pickPlayer("+pl.id+")"}"
      style="--c:${col};">
      <style>.px-card[style*='${col}']::before{background:${col};}</style>
      <div class="px-card-av" style="background:${GBG[pl.pos]};">${avContent}</div>
      <div class="px-card-info">
        <div class="px-card-name">${pl.name}</div>
        <div class="px-card-club">${pl.club}</div>
        <div class="px-card-tags">
          <span class="px-tag" style="color:${col};border-color:${col};">${LBL[pl.pos]}</span>
          <span class="px-tag" style="color:#ffcc00;border-color:#ffcc00;">★${pl.r}</span>
          <span class="px-tag" style="color:#aaaaaa;border-color:#444;">${pl.foot==="L"?"ZURDO":"DIEST"}</span>
        </div>
        <div class="px-popbar"><div class="px-popbar-fill" style="width:${pl.pop}%;background:${col};"></div></div>
      </div>
      <div class="px-card-num" style="color:${col};">${pl.n}</div>
    </div>`;
  }).join("");
}
function pickPlayer(pid){
  const pl=P.find(x=>x.id===pid);
  if(!pl||!activeSlot)return;
  lineup[activeSlot.slotId]=pl;
  closeModal();save();renderBuilder();playSelect();
}

/* ═══════════════════ SHARE ══════════════════════════════ */
function openShare(){
  const ss=getSlots(selForm);
  document.getElementById("scForm").textContent=selForm;
  document.getElementById("scRows").innerHTML=
    ["GK","DEF","MID","ATT"].map(rt=>{
      const rs=ss.filter(s=>s.pos===rt);
      return `<div class="sc-row">${rs.map(s=>{
        const pl=lineup[s.id];
        if(!pl)return`<div class="sc-slot"><div class="sc-av" style="border-color:#555;background:#222;">?</div><div class="sc-nm">–</div></div>`;
        const url=PHOTOS[pl.slug];
        const isCap=captain===pl.id;
        return`<div class="sc-slot">
          <div class="sc-av" style="background:${GBG[pl.pos]};border-color:${COL[pl.pos]};">
            ${url?`<img src="${url}" alt="" style="image-rendering:pixelated;" onerror="this.remove();">`:`${ini(pl.name)}`}
          </div>
          <div class="sc-nm">${pl.name.split(" ")[0]}${isCap?" ©":""}</div>
        </div>`;
      }).join("")}</div>`;
    }).join("");
  document.getElementById("shareOv").classList.add("open");
  playSelect();
}
function closeShare(){document.getElementById("shareOv").classList.remove("open");}
function whatsapp(){
  const ss=getSlots(selForm);
  const rows=["GK","DEF","MID","ATT"].map(rt=>{
    const names=ss.filter(s=>s.pos===rt).map(s=>{
      const pl=lineup[s.id];
      if(!pl)return"–";
      return captain===pl.id?`*${pl.name} ©*`:pl.name;
    }).join(", ");
    return `${LBL[rt]}: ${names}`;
  }).join("\n");
  const text=`⚽ *MI ONCE PIXEL ART — ${selForm}* 🕹️\n\n${rows}\n\n🇪🇸 #EligeTuOnce #España #Mundial2026\n🏆 Crea el tuyo!`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank");
}

load();
renderForms();
renderHomeStars();
loadPhotos();
